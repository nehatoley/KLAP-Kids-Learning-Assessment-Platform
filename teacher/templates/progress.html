<!DOCTYPE html>
{% load static %}

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Quiz Result</title>

<link rel="stylesheet"
      href="{% static 'css/teacher.css' %}">

<style>

.result-container{

    width:100%;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;
}

.result-card{

    width:500px;

    background:white;

    border-radius:30px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.1);
}

.result-icon{

    font-size:70px;

    margin-bottom:20px;
}

.result-title{

    font-size:38px;

    color:#4f46e5;

    margin-bottom:15px;
}

.student-name{

    font-size:26px;

    font-weight:700;

    color:#222;

    margin-bottom:25px;
}

.score-box{

    background:#f5f7ff;

    padding:25px;

    border-radius:20px;

    margin-bottom:25px;
}

.score{

    font-size:42px;

    font-weight:800;

    color:#22c55e;

    margin-bottom:10px;
}

.percentage{

    font-size:28px;

    color:#4f46e5;

    font-weight:700;
}

.level{

    margin-top:20px;

    font-size:20px;

    color:#555;
}

.result-btn{

    display:inline-block;

    margin-top:30px;

    text-decoration:none;

    background:
    linear-gradient(
        to right,
        #6a5af9,
        #4f46e5
    );

    color:white;

    padding:14px 28px;

    border-radius:14px;

    font-weight:700;

    transition:0.3s;
}

.result-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(79,70,229,0.3);
}

</style>

</head>

<body>


<div class="result-container">

    <div class="result-card">

        <div class="result-icon">
            🎉
        </div>

        <h1 class="result-title">
            Test Completed
        </h1>

        <div class="student-name">
            {{ student.name }}
        </div>


        <div class="score-box">

            <div class="score">

                {{ score }} / {{ total }}

            </div>

            <div class="percentage">

                {{ percentage }}%

            </div>

        </div>



        <a href="{% url 'teacher_dashboard' %}"
           class="result-btn">

           Back to Dashboard

        </a>

    </div>

</div>

</body>
</html>
