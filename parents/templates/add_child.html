<!DOCTYPE html>
{% load static %}

<html>

<head>

    <title>Add Child</title>

    <link rel="stylesheet" href="{% static 'css/parent.css' %}">

</head>

<body>

<!-- NAVBAR -->

<div class="parent-navbar">

    <a href="/parent/parent-dashboard/" class="parent-logo">
        KLAP
    </a>

    <a href="/logout/" class="logout-btn">
        Logout
    </a>

</div>


<!-- FORM -->

<div class="add-child-container">

    <div class="add-child-card">

        <h2>
            ➕ Add Child
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="save-btn">
                Save Child
            </button>

        </form>

    </div>

</div>

</body>
</html>
