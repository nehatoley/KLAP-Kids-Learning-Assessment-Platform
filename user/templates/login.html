<!DOCTYPE html>
{% load static %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KLAP</title>

    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <a href="/" class="logo">
            KLAP
        </a>

        <h1>
            Welcome Back 👋
        </h1>

        <p>
            Login to continue your smart learning journey with KLAP.
        </p>

        <img src="{% static 'images/kids1.jpeg' %}">

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Login</h2>

            <form method="POST">

                {% csrf_token %}

                <div class="input-group">

                    <label>Username</label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter Username"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter Password"
                        required
                    >

                </div>

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="bottom-text">
                Don't have an account?
                <a href="/register/">Register</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
